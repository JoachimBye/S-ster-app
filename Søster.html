<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Søster — en liten, snill stemme hver morgen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: #E8DBC9;
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #3A2A24;
      overflow: hidden;
    }
    #root { height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; }

    /* Soft ambient backdrop — golden-hour gradient */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(242,198,106,0.35), transparent 60%),
        radial-gradient(ellipse 80% 60% at 50% 100%, rgba(232,168,124,0.25), transparent 60%),
        linear-gradient(180deg, #F4E6D2 0%, #E8DBC9 60%, #DCC8B0 100%);
      pointer-events: none;
      z-index: 0;
      transition: background 700ms ease;
    }
    #root { position: relative; z-index: 1; }

    @keyframes soster-breathe {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: 0.95; }
    }
    @keyframes soster-fadeUp {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes soster-unfold {
      0% { transform: rotateX(-92deg); opacity: 0; }
      100% { transform: rotateX(0); opacity: 1; }
    }

    /* Hide scrollbars inside the phone */
    .ios-scroll::-webkit-scrollbar { width: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel" src="app-screens.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const DEFAULTS = /*EDITMODE-BEGIN*/{
      "palette": "goldenHour",
      "letterStyle": "wax",
      "showTweaks": true
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(DEFAULTS);
      const palette = PALETTES[tweaks.palette] || PALETTES.goldenHour;

      // App state
      const [state, setState] = useState(() => {
        return loadState() || {
          onboarded: false,
          prefs: null,
          openedToday: null,    // ISO date string of today if opened
          archive: [],          // [{id, body, tone, savedAt}]
          tab: 'today',
          streak: 1,
        };
      });

      useEffect(() => { saveState(state); }, [state]);

      // Update body background to match palette
      useEffect(() => {
        document.body.style.background = palette.canvas;
        const before = document.querySelector('style[data-bg]');
        // We can't restyle ::before from JS easily, but the iOS frame fills most of the view.
      }, [palette]);

      // Today's deterministic message
      const todayKey = useMemo(() => new Date().toISOString().slice(0, 10), []);
      const message = useMemo(() => {
        if (!state.prefs) return null;
        return pickMessage(state.prefs, todayKey + (state.prefs.name || ''));
      }, [state.prefs, todayKey]);

      const opened = state.openedToday === todayKey;
      const todayArchiveId = `${todayKey}:${message?.tone || ''}`;
      const saved = state.archive.some(a => a.id === todayArchiveId);

      function handleOnboardDone(prefs) {
        setState(s => ({ ...s, onboarded: true, prefs, openedToday: null }));
      }
      function handleOpen() {
        setState(s => ({ ...s, openedToday: todayKey }));
      }
      function handleSave() {
        if (saved) return;
        setState(s => ({
          ...s,
          archive: [{
            id: todayArchiveId,
            body: message.body,
            tone: message.tone,
            savedAt: new Date().toISOString(),
          }, ...s.archive],
        }));
      }
      function handleUnsave(id) {
        setState(s => ({ ...s, archive: s.archive.filter(a => a.id !== id) }));
      }
      function handleReset() {
        if (!confirm('Starte på nytt? Dette sletter velkomstforløpet og arkivet.')) return;
        setState({ onboarded: false, prefs: null, openedToday: null, archive: [], tab: 'today', streak: 1 });
      }

      // Demo seed for archive when first arriving so it doesn't feel empty
      const seededArchive = useMemo(() => {
        if (state.archive.length > 0) return state.archive;
        return [];
      }, [state.archive]);

      // Determine which screen to show
      let screen;
      if (!state.onboarded || !state.prefs) {
        screen = <Onboarding palette={palette} onDone={handleOnboardDone} />;
      } else {
        const tab = state.tab;
        screen = (
          <div className="ios-scroll" data-screen-label={
            tab === 'today' ? '01 I dag' : tab === 'archive' ? '02 Arkiv' : '03 Deg'
          } style={{ height: '100%', overflowY: 'auto', position: 'relative' }}>
            {tab === 'today' && (
              <TodayScreen
                palette={palette}
                prefs={state.prefs}
                opened={opened}
                message={message}
                onOpen={handleOpen}
                onSave={handleSave}
                saved={saved}
                streak={state.streak || 1}
              />
            )}
            {tab === 'archive' && (
              <ArchiveScreen palette={palette} archive={state.archive} onUnsave={handleUnsave} />
            )}
            {tab === 'you' && (
              <YouScreen
                palette={palette}
                prefs={state.prefs}
                archive={state.archive}
                setPrefs={(p) => setState(s => ({ ...s, prefs: p }))}
                onReset={handleReset}
              />
            )}
            <TabBar palette={palette} tab={tab} setTab={(t) => setState(s => ({ ...s, tab: t }))} />
          </div>
        );
      }

      // Update outer body backdrop to match palette
      const bodyBg = useMemo(() => ({
        background: `
          radial-gradient(ellipse 60% 50% at 50% 0%, ${palette.sun}55, transparent 60%),
          radial-gradient(ellipse 80% 60% at 50% 100%, ${palette.blush}40, transparent 60%),
          linear-gradient(180deg, ${palette.canvas} 0%, ${palette.canvas} 60%, ${palette.canvas} 100%)
        `,
      }), [palette]);

      return (
        <div style={{
          width: '100vw', height: '100vh',
          ...bodyBg,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: '"DM Sans", system-ui, sans-serif',
          transition: 'background 600ms ease',
        }}>
          <IOSDevice width={402} height={874}>
            {screen}
          </IOSDevice>

          <TweaksPanel title="Justeringer">
            <TweakSection label="Palett">
              <TweakRadio
                label="Stemning"
                value={tweaks.palette}
                options={['goldenHour','duskRose','sagebrush','morningMist']}
                onChange={(v) => setTweak('palette', v)}
              />
              <div style={{
                display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 6, marginTop: 4,
              }}>
                {Object.entries(PALETTES).map(([k, p]) => (
                  <button
                    key={k}
                    onClick={() => setTweak('palette', k)}
                    title={p.name}
                    style={{
                      height: 44,
                      borderRadius: 10,
                      border: tweaks.palette === k ? `2px solid #fff` : `2px solid transparent`,
                      outline: tweaks.palette === k ? `1px solid #000` : 'none',
                      cursor: 'pointer',
                      padding: 0, overflow: 'hidden',
                      display: 'flex',
                    }}
                  >
                    <div style={{ flex: 2, background: p.canvas }}/>
                    <div style={{ flex: 1, background: p.accent }}/>
                    <div style={{ flex: 1, background: p.blush }}/>
                  </button>
                ))}
              </div>
              <div style={{ fontSize: 12, opacity: 0.7, marginTop: 4 }}>
                {PALETTES[tweaks.palette]?.name}
              </div>
            </TweakSection>

            <TweakSection label="Dagens brev">
              <TweakButton label="Forsegle dagens brev igjen" onClick={() => setState(s => ({ ...s, openedToday: null }))} />
              <TweakButton label="Start velkomstforløpet på nytt" onClick={() => {
                if (confirm('Starte velkomstforløpet på nytt?')) {
                  setState({ onboarded: false, prefs: null, openedToday: null, archive: [], tab: 'today', streak: 1 });
                }
              }} />
              <TweakButton label="Fyll gledesarkivet (demo)" onClick={() => {
                const seed = LIBRARY.slice(0, 4).map((m, i) => ({
                  id: `seed-${i}`,
                  body: m.body,
                  tone: m.tone,
                  savedAt: new Date(Date.now() - (i+1) * 86400000).toISOString(),
                }));
                setState(s => ({ ...s, archive: [...seed, ...s.archive.filter(a => !a.id.startsWith('seed-'))] }));
              }} />
            </TweakSection>
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
